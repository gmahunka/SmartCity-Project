name: Fetch SmartCity Data (Daily)

on:
  schedule:
    # Run once a day at 06:00 UTC (~7AM Budapest)
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Fetch yesterday's data
        run: python fetcher.py
        env:
          ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}

      - name: Commit and push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "data: $(date +%Y-%m-%d) daily fetch"
          git push
