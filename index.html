<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Battery Monitor</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eee; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
        .error-msg { color: red; font-weight: bold; margin: 10px 0; display: none; }
        .loading { display: none; color: blue; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin: 16px 0; }
        .stat-card { border: 1px solid #ddd; border-radius: 8px; padding: 10px; background: #fafafa; }
        .stat-title { font-size: 12px; color: #666; }
        .stat-value { font-size: 20px; font-weight: bold; margin-top: 4px; }
        #plotContainer { margin-top: 16px; }
        #plotImage { max-width: 100%; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container">
    <h1>Battery Monitoring</h1>

    <div class="controls">
        Datum: <input type="date" id="selectedDate">
        <button onclick="updateDashboard()">Lekeres</button>
    </div>

    <div id="error" class="error-msg">Hiba tortent a lekeres soran!</div>
    <div id="loader" class="loading">Adatok betoltese...</div>

    <div id="statusText"></div>
    <div id="stats" class="stats"></div>

    <div id="plotContainer">
        <img id="plotImage" alt="Battery matplotlib diagram">
    </div>
</div>

<script>
    const formatDate = (date) => {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    };

    function setDefaultDate() {
        const today = new Date();
        document.getElementById('selectedDate').value = formatDate(today);
    }

    function getNextDate(dateString) {
        const date = new Date(dateString);
        date.setDate(date.getDate() + 1);
        return formatDate(date);
    }

    function renderStats(stats) {
        const statsDiv = document.getElementById('stats');
        const entries = [
            ['Koltseg (okos rendszer)', `${stats.smart_cost_huf.toFixed(2)} Ft`],
            ['Koltseg (akku nelkul)', `${stats.no_battery_cost_huf.toFixed(2)} Ft`],
            ['Napi megtakaritas', `${stats.saving_huf.toFixed(2)} Ft`],
            ['EUR/HUF arfolyam (napi)', `${(stats.eur_huf_rate ?? 410).toFixed(2)} HUF/EUR`],
            ['Atlagar', `${stats.avg_price_huf_kwh.toFixed(2)} Ft/kWh`],
            ['Napi fogyasztas', `${stats.total_load_kwh.toFixed(2)} kWh`],
            ['Napi PV termeles', `${stats.total_pv_kwh.toFixed(2)} kWh`]
        ];

        statsDiv.innerHTML = entries.map(([title, value]) => `
            <div class="stat-card">
                <div class="stat-title">${title}</div>
                <div class="stat-value">${value}</div>
            </div>
        `).join('');
    }

    async function updateDashboard() {
        const selectedDate = document.getElementById('selectedDate').value;
        const start = selectedDate;
        const end = getNextDate(selectedDate);
        const errorDiv = document.getElementById('error');
        const loader = document.getElementById('loader');
        const statusText = document.getElementById('statusText');
        const plotImage = document.getElementById('plotImage');

        errorDiv.style.display = 'none';
        loader.style.display = 'block';
        statusText.textContent = '';

        try {
            const response = await fetch(`/api/battery-monitor?start=${start}&end=${end}`);
            const data = await response.json();
            loader.style.display = 'none';

            if (!response.ok || data.error) {
                throw new Error(data.error || 'Server error');
            }

            renderStats(data.stats);
            plotImage.src = `data:image/png;base64,${data.plot_image_base64}`;
        } catch (error) {
            loader.style.display = 'none';
            errorDiv.style.display = 'block';
            errorDiv.innerText = `Error: ${error.message}`;
            console.error(error);
        }
    }

    window.onload = () => {
        setDefaultDate();
        updateDashboard();
    };
</script>
</body>
</html>
