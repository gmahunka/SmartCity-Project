<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Áramár Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eee; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        .error-msg { color: red; font-weight: bold; margin: 10px 0; display: none; }
        .loading { display: none; color: blue; }
    </style>
</head>
<body>

<div class="container">
    <h1>Áramár Monitor</h1>
    
    <div>
        Ettől: <input type="date" id="startDate">
        Eddig: <input type="date" id="endDate">
        <button onclick="updateChart()">Lekérés</button>
    </div>

    <div id="error" class="error-msg">Hiba történt a lekérés során!</div>
    <div id="loader" class="loading">Adatok betöltése...</div>

    <canvas id="priceChart" style="margin-top:20px;"></canvas>
</div>

<script>
    let myChart;

    // Helper function to format dates to YYYY-MM-DD for the input fields
    const formatDate = (d) => {
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    };

    // Calculate and set default dates (Yesterday to Today)
    function setDefaultDates() {
        const today = new Date();
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);

        document.getElementById('startDate').value = formatDate(yesterday);
        document.getElementById('endDate').value = formatDate(today);
    }

    async function updateChart() {
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;
        const errorDiv = document.getElementById('error');
        const loader = document.getElementById('loader');

        errorDiv.style.display = 'none';
        loader.style.display = 'block';

        try {
            const url = `http://127.0.0.1:5000/api/prices?start=${start}&end=${end}`;
            console.log("Calling API:", url);

            const response = await fetch(url);
            if (!response.ok) throw new Error('Server error');
            
            const data = await response.json();
            loader.style.display = 'none';

            const labels = data.map(e => new Date(e.time).toLocaleString('hu-HU', {
                year: 'numeric', month: 'short', day: 'numeric', 
                hour: '2-digit', minute: '2-digit'
            }));
            const prices = data.map(e => e.HUF_kWh);

            const ctx = document.getElementById('priceChart').getContext('2d');
            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Ft / kWh',
                        data: prices,
                        borderColor: 'blue',
                        backgroundColor: 'rgba(0,0,255,0.1)',
                        fill: true,
                        pointRadius: 0
                    }]
                }
            });
        } catch (err) {
            loader.style.display = 'none';
            errorDiv.style.display = 'block';
            errorDiv.innerText = "Error: " + err.message;
            console.error(err);
        }
    }

    // Initialize dates and load chart on first load
    window.onload = () => {
        setDefaultDates();
        updateChart();
    };
</script>
</body>
</html>
